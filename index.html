<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello World</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, "Microsoft YaHei", sans-serif;
        background: #f6f8fb;
        color: #172033;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(48px, 8vw, 96px);
        letter-spacing: 0;
      }

      p {
        margin: 0;
        font-size: 20px;
        color: #526174;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello, World!</h1>
      <p>你好，世界。</p>
    </main>
  </body>
</html>
